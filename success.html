<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Template Watches</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .success-page { min-height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: var(--gutter); background: var(--ivory); }
    .success-icon { font-family: var(--serif); font-size: 3rem; font-style: italic; color: var(--gold); margin-bottom: 2rem; }
    .success-heading { font-family: var(--serif); font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; color: var(--ink); line-height: 1.1; margin-bottom: 1.25rem; }
    .success-heading em { font-style: italic; color: var(--gold); }
    .success-body { font-family: var(--serif); font-size: 1.125rem; font-style: italic; color: var(--warm-gray); max-width: 36ch; line-height: 1.7; margin-bottom: 2.5rem; }
    .success-divider { width: 40px; height: 1px; background: var(--gold); margin: 0 auto 2.5rem; }
    .success-back { font-family: var(--mono); font-size: .6875rem; letter-spacing: .16em; text-transform: uppercase; color: var(--ink); border-bottom: 1px solid var(--ink-40); padding-bottom: 2px; transition: color .3s, border-color .3s; }
    .success-back:hover { color: var(--gold); border-color: var(--gold); }
  </style>
</head>
<body>
  <div class="success-page">
    <p class="success-icon">✦</p>
    <h1 class="success-heading">Thank you —<br /><em>we'll be in touch.</em></h1>
    <div class="success-divider"></div>
    <p class="success-body">Your message has been received. A member of our Geneva atelier team will respond within 48 hours.</p>
    <a href="/" class="success-back">← Return to Template Watches</a>
  </div>
</body>
</html>
